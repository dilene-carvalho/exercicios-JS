<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contador</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1 id="titulo">Vamos contar</h1>
    </header>
    <section>
      <div id="dados">
        <p>
          Início do Contador:
          <input type="number" name="txtini" id="txtini" min="0" />
        </p>
        <p>
          Fim do Contador:
          <input type="number" name="txtfim" id="txtfim" />
        </p>
        <p>
          Ao passo de:
          <input type="number" name="txtpas" id="txtpas" />
        </p>
        <p>
          <input type="button" value="Contar" id="botao" onclick="contar()" />
        </p>
      </div>
      <div id="res">Preparando a contagem...</div>
    </section>
    <footer>
      <p>&copy; CursoemVideo</p>
    </footer>
    <script src="scripts.js"></script>
  </body>
</html>
